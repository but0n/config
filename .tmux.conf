unbind C-b
set -g prefix `
bind-key ` last-window
bind-key e send-prefix

bind c new-window -c "#{pane_current_path}"

# set -g mouse on
setw -g mode-keys vi

set -g status-position bottom

set -g status-bg colour235
set -g status-fg colour208

set -g status-left ''

set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,none] %H:%M '

setw -g window-status-current-format '#[bg=colour238] #I#[fg=colour250]:#[fg=colour255]#{b:pane_current_path}#[fg=colour244][#W]#[fg=colour50]#F '
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#{b:pane_current_path}#[fg=colour244][#W]'

set-option -g renumber-windows on

